name: Daily Flight Price Tracker

on:
  schedule:
    # Runs every day at 08:00 UTC = 09:00 Paris time (CET, winter)
    # During summer (CEST, UTC+2), change 08:00 to 07:00 to keep it at 09:00 local
    - cron: '0 8 * * *'

  # Allows you to trigger the workflow manually from GitHub's website
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  track-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl google-search-results

      - name: Fetch flight prices
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python tracker.py

      - name: Export Excel dashboard
        run: python export.py

      - name: Generate web dashboard
        run: python dashboard.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flights.db flight_prices.xlsx index.html
          git diff --staged --quiet || git commit -m "Daily price update - $(date +'%Y-%m-%d')"
          git push

      - name: Upload dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy-pages:
    needs: track-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
